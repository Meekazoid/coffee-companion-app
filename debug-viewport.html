<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: sans-serif; padding: 20px; background: #fdf8f2; }
.info { background: white; border: 1px solid #ccc; border-radius: 8px; padding: 16px; margin-bottom: 12px; font-size: 14px; }
.label { font-weight: bold; color: #8b6f47; margin-bottom: 4px; }
.val { font-size: 18px; color: #333; }
</style>
</head>
<body>
<div class="info"><div class="label">window.innerWidth</div><div class="val" id="iw"></div></div>
<div class="info"><div class="label">window.innerHeight</div><div class="val" id="ih"></div></div>
<div class="info"><div class="label">devicePixelRatio</div><div class="val" id="dpr"></div></div>
<div class="info"><div class="label">screen.width</div><div class="val" id="sw"></div></div>
<div class="info"><div class="label">document.documentElement.clientWidth</div><div class="val" id="cw"></div></div>
<div class="info"><div class="label">navigator.userAgent</div><div class="val" id="ua" style="font-size:11px;word-break:break-all;"></div></div>
<script>
document.getElementById('iw').textContent = window.innerWidth;
document.getElementById('ih').textContent = window.innerHeight;
document.getElementById('dpr').textContent = window.devicePixelRatio;
document.getElementById('sw').textContent = screen.width;
document.getElementById('cw').textContent = document.documentElement.clientWidth;
document.getElementById('ua').textContent = navigator.userAgent;
</script>
</body>
</html>
